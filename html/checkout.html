<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán | SPORT ZONE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/checkout.css">
</head>

<body class="p-4">

    <h2 class="mb-4">💳 Thanh toán</h2>

    <div class="row">

        <div class="col-md-7">
            <div class="mb-3">
                <label>Họ tên</label>
                <input type="text" class="form-control" id="name" list="nameList">
                <datalist id="nameList"></datalist>
            </div>

            <div class="mb-3">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" id="phone" list="phoneList"
                       oninput="this.value = this.value.replace(/\D/g,'')">
                <datalist id="phoneList"></datalist>
            </div>

            <div class="mb-3">
                <label>Địa chỉ</label>
                <input type="text" class="form-control" id="address" list="addressList">
                <datalist id="addressList"></datalist>
            </div>

            <div class="mb-3">
                <label>Phương thức thanh toán</label>
                <select class="form-select" id="payment">
                    <option value="cod">Thanh toán khi nhận hàng</option>
                    <option value="bank">Chuyển khoản</option>
                </select>
            </div>
            <div id="qrBox" class="mt-3 text-center" style="display:none;">
    <h6>Quét mã để thanh toán</h6>

    <img id="qrImg" width="220" class="mb-2">

    <div style="font-size:14px;color:#ccc">
        Ngân hàng: <b>Vietcombank</b><br>
        STK: <b>1050497105</b><br>
        Chủ TK: <b>NGUYEN HOAI PHU</b>
    </div>

    <div class="mt-2">
        Nội dung: <b id="transferNote"></b>
    </div>

    <p class="mt-2">⏳ Hết hạn sau: <span id="timer">05:00</span></p>

    <button class="btn btn-warning btn-sm" onclick="generateQR()">Tạo QR mới</button>
</div>
            <button onclick="placeOrder()" class="btn btn-success w-100">
                Xác nhận đơn hàng
            </button>
        </div>

        <div class="col-md-5">
            <div class="total-box">
                <h5 class="mb-3">🧾 Đơn hàng của bạn</h5>
                <div id="orderList"></div>
                <hr>
                <h4>Tổng tiền</h4>
                <div id="totalPrice" class="total-price">0đ</div>
            </div>
        </div>

    </div>

    <div class="success-box" id="successBox">
        <h2>🎉 Đặt hàng thành công!</h2>
        <p>Cảm ơn bạn đã mua hàng tại SportZone</p>
        <button class="btn btn-primary mt-3" onclick="goHome()">Quay về trang sản phẩm</button>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
